name: cdc-streaming-pipeline

# Brings up the CDC source path end to end:
#   Postgres (logical replication) -> Debezium -> Redpanda (Kafka API) -> consumer
# The consumer here is the lightweight dev consumer (deploy/kafka_consumer.py).
# In production the consumer is the Spark job (src/cdcpipe/spark_job.py) submitted
# to a Spark cluster; that is intentionally not part of this compose file.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retail
    command: ["postgres", "-c", "wal_level=logical",
              "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retail"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports: ["19092:19092"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  connect:
    image: debezium/connect:2.7
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_healthy }
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: cdc-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
    ports: ["8083:8083"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot: registers the Debezium connector, then exits.
  connector-setup:
    image: curlimages/curl:8.8.0
    depends_on:
      connect: { condition: service_healthy }
    volumes:
      - ./deploy/debezium/orders-connector.json:/config/orders-connector.json:ro
    entrypoint: ["sh", "-c",
      "curl -sf -X POST -H 'Content-Type: application/json'
       --data @/config/orders-connector.json
       http://connect:8083/connectors && echo ' connector registered'"]
    restart: on-failure

  # Local dev consumer: Kafka -> merge core -> Iceberg (writes to ./data).
  consumer:
    build: .
    depends_on:
      connector-setup: { condition: service_completed_successfully }
    volumes:
      - ./data:/data
    entrypoint: ["python", "/app/deploy/kafka_consumer.py"]
    command: ["--bootstrap", "redpanda:9092",
              "--topic", "dbserver.public.orders",
              "--warehouse", "/data/lakehouse"]
